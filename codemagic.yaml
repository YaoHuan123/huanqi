# HuanQi iOS — Codemagic (ios branch)
#
# App Store upload: profile huanqi-appstore
# Certificate: reuse existing Distribution .p12 (Codemagic ref huanqi-hoc) or set to huanqi-appstore if re-uploaded

workflows:
  huanqi-ios-appstore:
    name: HuanQi iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - huanqi-appstore
        certificates:
          - huanqi-hoc
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        VITE_API_BASE_URL: "https://hellotita.top"
        VITE_APPLE_BUNDLE_ID: io.github.YaoHuan123.huanqi
        VITE_IAP_DEV_MOCK: "0"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Build bundled native app and sync iOS
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile
          echo "=== Bundled app (no remote server.url) ==="
          cat apps/mobile/ios/App/App/capacitor.config.json

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --export-method app-store
          ls -la build/ios/ipa/

    artifacts:
      - apps/mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # Manual upload: download IPA from Artifacts → Apple Transporter → App Store Connect
