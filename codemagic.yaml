# HuanQi iOS — Codemagic CI/CD
#
# Setup (Codemagic UI):
# 1. Connect repo https://github.com/YaoHuan123/huanqi
# 2. Team settings → Integrations → App Store Connect API key → name it (e.g. codemagic)
# 3. Team settings → Code signing identities → iOS → upload cert + provisioning profile
#    OR enable automatic code signing for bundle id com.huanqi.app
# 4. App settings → Environment variables → group "huanqi_production":
#      CAPACITOR_SERVER_URL = https://your-deployed-web-app.com
#      VITE_APP_URL         = same as above (optional)
# 5. Replace APP_STORE_APP_ID and app_store_connect integration name below
# 6. Apple Developer: enable "Sign in with Apple" for com.huanqi.app

workflows:
  huanqi-ios-release:
    name: HuanQi iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic # ← replace with your App Store Connect API key name

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.huanqi.app
      groups:
        - huanqi_production # CAPACITOR_SERVER_URL (+ optional VITE_APP_URL)
      vars:
        BUNDLE_ID: com.huanqi.app
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        # App Store Connect → App → General → Apple ID (numeric)
        APP_STORE_APP_ID: "0000000000"
        # Prisma postinstall only needs a valid URL format
        DATABASE_URL: "file:./dev.db"
        NODE_OPTIONS: "--max-old-space-size=4096"
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.npm
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/apps/mobile/ios/App/Pods

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Configure Capacitor server URL (production WebView target)
        script: |
          set -e
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "ERROR: Set CAPACITOR_SERVER_URL in the huanqi_production variable group."
            exit 1
          fi
          if [[ ! "$CAPACITOR_SERVER_URL" =~ ^https:// ]]; then
            echo "ERROR: Production iOS builds require HTTPS CAPACITOR_SERVER_URL."
            exit 1
          fi
          cat > apps/mobile/.env.ios.local <<EOF
          CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL
          VITE_APP_URL=${VITE_APP_URL:-$CAPACITOR_SERVER_URL}
          EOF
          echo "Capacitor will load: $CAPACITOR_SERVER_URL"

      - name: Build mobile shell and sync iOS native project
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles

      - name: Increment build number
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          if [ "$APP_STORE_APP_ID" = "0000000000" ]; then
            echo "Using Codemagic BUILD_NUMBER because APP_STORE_APP_ID is not configured."
            NEXT=$BUILD_NUMBER
          else
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || true)
            NEXT=$((${LATEST:-0} + 1))
          fi
          agvtool new-version -all "$NEXT"
          echo "iOS build number set to $NEXT"

      - name: Build signed IPA
        script: |
          set -e
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_PROJECT_DIR/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - yao@example.com # ← replace with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  huanqi-ios-adhoc:
    name: HuanQi iOS Ad Hoc (internal)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.huanqi.app
      groups:
        - huanqi_production
      vars:
        BUNDLE_ID: com.huanqi.app
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        DATABASE_URL: "file:./dev.db"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install monorepo dependencies
        script: npm ci

      - name: Configure Capacitor server URL
        script: |
          set -e
          test -n "$CAPACITOR_SERVER_URL"
          cat > apps/mobile/.env.ios.local <<EOF
          CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL
          VITE_APP_URL=${VITE_APP_URL:-$CAPACITOR_SERVER_URL}
          EOF

      - name: Build mobile shell and sync iOS native project
        script: |
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile

      - name: Install CocoaPods
        script: |
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_PROJECT_DIR/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
