# HuanQi iOS — Codemagic (ios branch)
#
# App Store upload: profile huanqi-appstore
# Certificate: reuse existing Distribution .p12 (Codemagic ref huanqi-hoc)
#
# Auto-upload to TestFlight: create App Store Connect API key in Apple,
# add it in Codemagic Personal Account → Integrations (name must match below)
#   integrations.app_store_connect: huanqi-asc

workflows:
  huanqi-ios-appstore:
    name: HuanQi iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: huanqi-asc

    environment:
      ios_signing:
        provisioning_profiles:
          - huanqi-appstore
        certificates:
          - huanqi-hoc
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        VITE_API_BASE_URL: "https://hellotita.top"
        VITE_APPLE_BUNDLE_ID: io.github.YaoHuan123.huanqi
        VITE_IAP_DEV_MOCK: "0"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Build bundled native app and sync iOS
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile
          echo "=== Bundled app (no remote server.url) ==="
          cat apps/mobile/ios/App/App/capacitor.config.json

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles
          # use-profiles writes $HOME/export_options.plist with provisioningProfiles.
          # Override export method to app-store (do not use a minimal custom plist).
          if [ ! -f "$HOME/export_options.plist" ]; then
            echo "export_options.plist not generated by use-profiles" >&2
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print :method" "$HOME/export_options.plist" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :method app-store" "$HOME/export_options.plist"
          else
            /usr/libexec/PlistBuddy -c "Add :method string app-store" "$HOME/export_options.plist"
          fi
          echo "=== export_options.plist ==="
          cat "$HOME/export_options.plist"

      - name: Build App Store IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"
          ls -la build/ios/ipa/

    artifacts:
      - apps/mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload IPA only; do not submit TestFlight beta review (needs extra test info)
        submit_to_testflight: false
        submit_to_app_store: false
