# HuanQi iOS — Codemagic CI/CD
#
# Apple 账号材料（本地路径 E:\ios调试和上线材料\huanqi）：
#   Bundle ID : io.github.YaoHuan123.huanqi
#   Team ID   : TCPBS85F56
#   Ad Hoc 描述文件 : huanqihoc.mobileprovision（profile 名称 huanqi-hoc）
#   发布证书 .p12   : ..\发布证书\2b054e3a68074341bebf0230796bec0f.p12
#
# Codemagic → Code signing identities Reference name: huanqi-hoc
#
# 在 codemagic.yaml 的 CAPACITOR_SERVER_URL 填入已部署的 apps/web HTTPS 地址

workflows:
  huanqi-ios-release:
    name: HuanQi iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic # ← 改成你在 Codemagic 里配置的 ASC API Key 名称

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.github.YaoHuan123.huanqi
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi
        APPLE_TEAM_ID: TCPBS85F56
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        APP_STORE_APP_ID: "0000000000" # ← App Store Connect 里的 Apple ID（数字）
        CAPACITOR_SERVER_URL: "https://YOUR_WEB_APP_URL" # ← 改成 apps/web 生产 HTTPS 地址
        DATABASE_URL: "file:./dev.db"
        NODE_OPTIONS: "--max-old-space-size=4096"
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.npm
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/apps/mobile/ios/App/Pods

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Configure Capacitor server URL (production WebView target)
        script: |
          set -e
          if [ -z "$CAPACITOR_SERVER_URL" ] || [ "$CAPACITOR_SERVER_URL" = "https://YOUR_WEB_APP_URL" ]; then
            echo "ERROR: Set CAPACITOR_SERVER_URL in codemagic.yaml vars or Codemagic Environment variables."
            exit 1
          fi
          if [[ ! "$CAPACITOR_SERVER_URL" =~ ^https:// ]]; then
            echo "ERROR: Production iOS builds require HTTPS CAPACITOR_SERVER_URL."
            exit 1
          fi
          cat > apps/mobile/.env.ios.local <<EOF
          CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL
          VITE_APP_URL=${VITE_APP_URL:-$CAPACITOR_SERVER_URL}
          EOF

      - name: Build mobile shell and sync iOS native project
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles

      - name: Increment build number
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          if [ "$APP_STORE_APP_ID" = "0000000000" ]; then
            NEXT=$BUILD_NUMBER
          else
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || true)
            NEXT=$((${LATEST:-0} + 1))
          fi
          agvtool new-version -all "$NEXT"

      - name: Build signed IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - yao@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  huanqi-ios-adhoc:
    name: HuanQi iOS Ad Hoc
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - huanqi-hoc
        certificates:
          - huanqi-hoc
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi
        APPLE_TEAM_ID: TCPBS85F56
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        CAPACITOR_SERVER_URL: "https://YOUR_WEB_APP_URL" # ← 改成 apps/web 生产 HTTPS 地址
        DATABASE_URL: "file:./dev.db"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Configure Capacitor server URL
        script: |
          set -e
          if [ -z "$CAPACITOR_SERVER_URL" ] || [ "$CAPACITOR_SERVER_URL" = "https://YOUR_WEB_APP_URL" ]; then
            echo "ERROR: Set CAPACITOR_SERVER_URL in codemagic.yaml vars or Codemagic Environment variables."
            exit 1
          fi
          cat > apps/mobile/.env.ios.local <<EOF
          CAPACITOR_SERVER_URL=$CAPACITOR_SERVER_URL
          VITE_APP_URL=${VITE_APP_URL:-$CAPACITOR_SERVER_URL}
          EOF

      - name: Build mobile shell and sync iOS native project
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles

      - name: Build ad hoc IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
