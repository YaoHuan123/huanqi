# HuanQi iOS — Codemagic (ios branch)
#
# Native app: UI bundled in IPA, API at VITE_API_BASE_URL
# Codemagic → Code signing Reference name: huanqi-hoc (profile + cert)

workflows:
  huanqi-ios-adhoc:
    name: HuanQi iOS Ad Hoc
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - huanqi-hoc
        certificates:
          - huanqi-hoc
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        VITE_API_BASE_URL: "http://192.168.137.1:3001"
        VITE_APPLE_BUNDLE_ID: io.github.YaoHuan123.huanqi
        VITE_APPLE_DEV_MOCK: "1"
        DATABASE_URL: "file:./dev.db"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Build bundled native app and sync iOS
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          npm run ios --workspace=mobile
          echo "=== Bundled app (no remote server.url) ==="
          cat apps/mobile/ios/App/App/capacitor.config.json

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles

      - name: Build ad hoc IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
          ls -la build/ios/ipa/

    artifacts:
      - apps/mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
