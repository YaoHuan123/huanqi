# HuanQi iOS — Codemagic (ios branch)
# 模板来源：E:\ios app 上线助手\codemagic.template.yaml
# 新 App 只改 PER-APP CONFIG 5 行；证书 app-common 共用。

workflows:
  ios-appstore:
    # ═══════════════════════════════════════════════════════════════════
    #  PER-APP CONFIG — 新 App 只改以下 5 行
    # ═══════════════════════════════════════════════════════════════════
    name: HuanQi iOS App Store                              # 1. 工作流显示名

    integrations:
      app_store_connect: huanqi-asc                         # 2. ASC 集成名

    environment:
      ios_signing:
        provisioning_profiles:
          - huanqi-appstore                                 # 3. 描述文件引用名
        certificates:
          - app-common                                      # 共用，不改
      vars:
        BUNDLE_ID: io.github.YaoHuan123.huanqi             # 4. Bundle ID
        VITE_API_BASE_URL: "https://hellotita.top"          # 5. 生产 API
        XCODE_SCHEME: App
        XCODE_PROJECT_DIR: apps/mobile/ios/App
        VITE_IAP_DEV_MOCK: "0"
        VITE_APPLE_DEV_MOCK: "0"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios
          include: true

    scripts:
      - name: Install monorepo dependencies
        script: |
          set -e
          npm ci

      - name: Build bundled native app and sync iOS
        script: |
          set -e
          export CAPACITOR_PLATFORM=ios
          export VITE_APPLE_BUNDLE_ID="$BUNDLE_ID"
          npm run ios --workspace=mobile
          echo "=== Bundled app (no remote server.url) ==="
          cat apps/mobile/ios/App/App/capacitor.config.json

      - name: Install CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          pod install

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles
          if [ ! -f "$HOME/export_options.plist" ]; then
            echo "export_options.plist not generated by use-profiles" >&2
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print :method" "$HOME/export_options.plist" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :method app-store" "$HOME/export_options.plist"
          else
            /usr/libexec/PlistBuddy -c "Add :method string app-store" "$HOME/export_options.plist"
          fi
          echo "=== export_options.plist ==="
          cat "$HOME/export_options.plist"

      - name: Build App Store IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"
          ls -la build/ios/ipa/

    artifacts:
      - apps/mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
